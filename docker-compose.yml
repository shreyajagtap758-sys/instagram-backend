
services:
  db:
    image: postgres:15
    container_name: instagram-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: instagram
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - .:/app
    depends_on:
      - db

volumes:
  pgdata: